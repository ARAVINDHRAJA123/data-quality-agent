<svg viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <!-- Background -->
  <rect width="860" height="540" fill="#ffffff" rx="16"/>

  <!-- ── HEADER ── -->
  <text x="430" y="38" text-anchor="middle" font-size="20" font-weight="800" fill="#1e293b">Data Quality Agent</text>
  <text x="430" y="58" text-anchor="middle" font-size="13" fill="#64748b">Agentic root-cause analysis for dbt test failures</text>

  <!-- ── TRIGGER BOX ── -->
  <rect x="24" y="80" width="190" height="80" rx="12" fill="#fff0f0" stroke="#f87171" stroke-width="2"/>
  <text x="119" y="106" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#ef4444">⚠ FAILURE</text>
  <text x="119" y="124" text-anchor="middle" font-size="14" font-weight="800" fill="#991b1b">dbt test FAILS</text>
  <text x="119" y="142" text-anchor="middle" font-size="10.5" fill="#b91c1c">not_null · unique · custom</text>

  <!-- red arrow → agent -->
  <line x1="214" y1="120" x2="244" y2="120" stroke="#f87171" stroke-width="2"/>
  <polygon points="244,114 256,120 244,126" fill="#f87171"/>

  <!-- ── AGENT BOX ── -->
  <rect x="258" y="72" width="310" height="96" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="413" y="100" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.5" fill="#3b82f6">🤖 AGENT</text>
  <text x="413" y="122" text-anchor="middle" font-size="20" font-weight="800" fill="#1e3a8a">agent.py</text>
  <text x="413" y="141" text-anchor="middle" font-size="11" fill="#1d4ed8">Claude / Gemini · multi-step tool-use loop</text>
  <text x="413" y="157" text-anchor="middle" font-size="11" fill="#1d4ed8">Decides next investigation step autonomously</text>

  <!-- slate arrow ← trigger mode (pointing into agent) -->
  <line x1="646" y1="120" x2="616" y2="120" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="616,114 604,120 616,126" fill="#94a3b8"/>

  <!-- ── TRIGGER MODE BOX ── -->
  <rect x="648" y="80" width="190" height="80" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="743" y="106" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#64748b">TRIGGER VIA</text>
  <text x="743" y="124" text-anchor="middle" font-size="13" font-weight="800" fill="#1e293b">CLI · Webhook · MCP</text>
  <text x="743" y="142" text-anchor="middle" font-size="10" fill="#475569">Claude Code · OpenClaw</text>
  <text x="743" y="156" text-anchor="middle" font-size="10" fill="#475569">Cursor · Zed · any client</text>

  <!-- vertical dashed connector: agent → tools panel -->
  <line x1="413" y1="168" x2="413" y2="192" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="407,190 413,200 419,190" fill="#93c5fd"/>

  <!-- ── TOOLS PANEL ── -->
  <rect x="24" y="202" width="616" height="216" rx="14" fill="#f0f7ff" stroke="#93c5fd" stroke-width="2" stroke-dasharray="7,4"/>
  <text x="332" y="226" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.5" fill="#3b82f6">AGENT TOOLS — CALLED AUTONOMOUSLY IN ANY ORDER</text>

  <!-- Tool cards row 1 -->
  <!-- get_failing_rows -->
  <rect x="38" y="236" width="186" height="54" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="131" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">get_failing_rows</text>
  <text x="131" y="274" text-anchor="middle" font-size="9.5" fill="#3b82f6">Fetch actual bad rows</text>
  <text x="131" y="286" text-anchor="middle" font-size="9.5" fill="#3b82f6">from BigQuery</text>

  <!-- get_model_lineage -->
  <rect x="234" y="236" width="186" height="54" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="327" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">get_model_lineage</text>
  <text x="327" y="274" text-anchor="middle" font-size="9.5" fill="#3b82f6">Upstream parents &amp;</text>
  <text x="327" y="286" text-anchor="middle" font-size="9.5" fill="#3b82f6">downstream children</text>

  <!-- get_model_sql -->
  <rect x="430" y="236" width="196" height="54" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="528" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">get_model_sql</text>
  <text x="528" y="274" text-anchor="middle" font-size="9.5" fill="#3b82f6">Compiled transformation</text>
  <text x="528" y="286" text-anchor="middle" font-size="9.5" fill="#3b82f6">SQL</text>

  <!-- Tool cards row 2 -->
  <!-- get_column_profile -->
  <rect x="38" y="300" width="186" height="54" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="131" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">get_column_profile</text>
  <text x="131" y="338" text-anchor="middle" font-size="9.5" fill="#3b82f6">Null count · distinct</text>
  <text x="131" y="350" text-anchor="middle" font-size="9.5" fill="#3b82f6">min · max</text>

  <!-- run_query -->
  <rect x="234" y="300" width="186" height="54" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="327" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">run_query</text>
  <text x="327" y="338" text-anchor="middle" font-size="9.5" fill="#3b82f6">Custom read-only</text>
  <text x="327" y="350" text-anchor="middle" font-size="9.5" fill="#3b82f6">BQ investigation</text>

  <!-- get_source_freshness -->
  <rect x="430" y="300" width="196" height="54" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="528" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">get_source_freshness</text>
  <text x="528" y="338" text-anchor="middle" font-size="9.5" fill="#3b82f6">Staleness of</text>
  <text x="528" y="350" text-anchor="middle" font-size="9.5" fill="#3b82f6">source tables</text>

  <!-- write_report full width -->
  <rect x="38" y="364" width="588" height="44" rx="8" fill="#f0fdf4" stroke="#4caf7d" stroke-width="2"/>
  <text x="332" y="383" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">✅ write_report</text>
  <text x="332" y="399" text-anchor="middle" font-size="10" fill="#15803d">Root cause · upstream lineage trace · recommended fix · severity</text>

  <!-- ── DATA SOURCES ── -->
  <!-- BigQuery -->
  <rect x="654" y="202" width="182" height="98" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="745" y="228" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.2" fill="#d97706">QUERIES</text>
  <text x="745" y="250" text-anchor="middle" font-size="16" font-weight="800" fill="#78350f">BigQuery</text>
  <text x="745" y="269" text-anchor="middle" font-size="10.5" fill="#92400e">raw · analytics</text>
  <text x="745" y="285" text-anchor="middle" font-size="10.5" fill="#92400e">Read-only</text>

  <!-- divider -->
  <text x="745" y="318" text-anchor="middle" font-size="16" fill="#cbd5e1">↕</text>

  <!-- dbt manifest -->
  <rect x="654" y="328" width="182" height="90" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="745" y="352" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.2" fill="#9333ea">READS</text>
  <text x="745" y="372" text-anchor="middle" font-size="15" font-weight="800" fill="#4c1d95">manifest.json</text>
  <text x="745" y="390" text-anchor="middle" font-size="10.5" fill="#6b21a8">dbt lineage graph</text>
  <text x="745" y="406" text-anchor="middle" font-size="10.5" fill="#6b21a8">Compiled SQL · tests</text>

  <!-- ── GREEN CONNECTOR: write_report → outputs ── -->
  <line x1="332" y1="408" x2="332" y2="428" stroke="#4caf7d" stroke-width="2"/>
  <!-- fan left -->
  <line x1="332" y1="428" x2="130" y2="444" stroke="#4caf7d" stroke-width="1.5"/>
  <polygon points="125,440 120,450 135,448" fill="#4caf7d"/>
  <!-- fan centre -->
  <line x1="332" y1="428" x2="332" y2="444" stroke="#4caf7d" stroke-width="1.5"/>
  <polygon points="326,442 332,452 338,442" fill="#4caf7d"/>
  <!-- fan right -->
  <line x1="332" y1="428" x2="541" y2="450" stroke="#4caf7d" stroke-width="1.5"/>
  <polygon points="546,446 551,456 536,454" fill="#4caf7d"/>

  <!-- ── OUTPUT CARDS ── -->
  <!-- Incident Report -->
  <rect x="24" y="454" width="202" height="64" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="125" y="477" text-anchor="middle" font-size="18">📄</text>
  <text x="125" y="496" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Incident Report</text>
  <text x="125" y="511" text-anchor="middle" font-size="10" fill="#64748b">reports/incident_*.md</text>

  <!-- MCP Clients -->
  <rect x="232" y="454" width="202" height="64" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="333" y="477" text-anchor="middle" font-size="18">🔌</text>
  <text x="333" y="496" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">MCP Clients</text>
  <text x="333" y="511" text-anchor="middle" font-size="10" fill="#64748b">Claude Code · OpenClaw · Cursor · Zed</text>

  <!-- Airflow Webhook -->
  <rect x="440" y="454" width="202" height="64" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="541" y="477" text-anchor="middle" font-size="18">🔄</text>
  <text x="541" y="496" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Airflow Webhook</text>
  <text x="541" y="511" text-anchor="middle" font-size="10" fill="#64748b">POST /investigate on failure</text>

  <!-- ── SAFETY BANNER ── -->
  <rect x="24" y="526" width="812" height="6" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>

</svg>
